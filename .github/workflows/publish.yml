name: macromalt Daily Publish

# ─────────────────────────────────────────────────────────────
# 스케줄 — KST / UTC 대응
#   KST 08:17  =  UTC 23:17 (전일)  →  cron: '17 23 * * *'
#   KST 14:17  =  UTC 05:17         →  cron: '17 5  * * *'
#   KST 20:17  =  UTC 11:17         →  cron: '17 11 * * *'
# ─────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '17 23 * * *'   # KST 08:17 (아침 슬롯)
    - cron: '17 5  * * *'   # KST 14:17 (오후 슬롯)
    - cron: '17 11 * * *'   # KST 20:17 (저녁 슬롯)
  workflow_dispatch:
    inputs:
      reason:
        description: '수동 실행 사유 (예: 긴급 발행, 재시도)'
        required: false
        default: 'manual trigger'

# 동시 실행 방지 — 이전 run이 끝나야 다음 run 시작
concurrency:
  group: macromalt-publish
  cancel-in-progress: false

# 최소 권한: 읽기 전용 (repo commit 없음)
permissions:
  contents: read

jobs:
  publish:
    name: Publish Post1 + Post2
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: 'Configure GitHub Actions'

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 환경 설정 ─────────────────────────────────
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      # ── 3. 의존성 설치 ──────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. SECRETS → .env 파일 + $GITHUB_ENV 이중 주입 ────────
      # 방법 A: .env 파일 작성 → load_dotenv() 호환
      # 방법 B: $GITHUB_ENV 주입 → OS env 직접 상속 (subprocess 포함)
      - name: Inject secrets into environment
        env:
          ENV_CONTENT: ${{ secrets.SECRETS }}
        run: |
          # A: .env 파일 작성
          printf '%s\n' "$ENV_CONTENT" > .env

          # B: KEY=VALUE 형식 줄만 추출 → $GITHUB_ENV 주입 (주석/빈 줄 제외)
          grep -E '^[A-Z_][A-Z0-9_]*=.+' .env >> $GITHUB_ENV || true

          # 검증: 로드된 키 목록 출력 (값 비노출)
          echo "=== SECRETS 로드된 키 ==="
          grep -E '^[A-Z_][A-Z0-9_]*=.+' .env | cut -d= -f1 || echo "(없음)"
          echo "========================="

      # ── 5. VARIABLES → $GITHUB_ENV 주입 ────────────────────
      # vars context는 자동으로 OS 환경변수가 되지 않으므로 명시적 전달 필요
      # VARIABLES 값이 dotenv 포맷(KEY=VALUE 멀티라인)이면 SECRETS와 동일 방식으로 파싱
      - name: Inject variables into environment
        env:
          VARS_CONTENT: ${{ vars.VARIABLES }}
        run: |
          if [ -n "$VARS_CONTENT" ]; then
            printf '%s\n' "$VARS_CONTENT" > .vars_tmp
            grep -E '^[A-Z_][A-Z0-9_]*=.+' .vars_tmp >> $GITHUB_ENV || true
            echo "=== VARIABLES 로드된 키 ==="
            grep -E '^[A-Z_][A-Z0-9_]*=.+' .vars_tmp | cut -d= -f1 || echo "(없음)"
            echo "=========================="
            rm -f .vars_tmp
          else
            echo "[WARN] vars.VARIABLES 비어있음 — 개별 vars 방식으로 fallback"
          fi

      # ── 6. 로그 디렉토리 준비 ──────────────────────────────
      - name: Prepare log directory
        run: mkdir -p logs

      # ── 7. 발행 파이프라인 실행 ─────────────────────────────
      - name: Run publish pipeline
        env:
          TIMEZONE:               ${{ vars.TIMEZONE || 'Asia/Seoul' }}
          SCRAPE_INTERVAL_MINUTES: ${{ vars.SCRAPE_INTERVAL_MINUTES || '60' }}
        run: python scripts/publish_daily.py

      # ── 8. 로그 artifact 업로드 (항상 실행) ────────────────
      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-log-${{ github.run_id }}
          path: |
            logs/macromalt_daily.log
            logs/publish_result.jsonl
          retention-days: 14
          if-no-files-found: warn
